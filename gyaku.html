<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逆再生</title>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
}
input, button {
  margin-top: 10px;
  width: 100%;
  font-size: 16px;
}
</style>
</head>
<body>

<h2>逆再生</h2>

<input type="file" id="fileInput" accept="audio/*">

<h3>再生開始位置</h3>
<input type="range" id="seekBar" min="0" max="100" value="0">
<div id="timeLabel">0:00 / 0:00</div>

<h3>音量</h3>
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.3">
<div id="volLabel">30%</div>

<button onclick="playReverse()">再生（逆再生）</button>
<button onclick="stopAudio()">停止</button>

<script>
let audioBuffer;
let ctx;
let gainNode;
let source;
let duration = 0;
let timer;

console.log("動いてる", this.value);

// ファイル読み込み
document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  ctx = new AudioContext();
  const arrayBuffer = await file.arrayBuffer();
  audioBuffer = await ctx.decodeAudioData(arrayBuffer);

  duration = audioBuffer.duration;

  const seekBar = document.getElementById('seekBar');
  seekBar.max = duration;
  seekBar.value = duration;

  updateTimeLabel(duration, duration);

  gainNode = ctx.createGain();
  gainNode.gain.value = 0.3; // デフォルト音量
  gainNode.connect(ctx.destination);
});

// 音量変更
const volumeSlider = document.getElementById('volume');
const volLabel = document.getElementById('volLabel');

function updateVolume() {
  const vol = parseFloat(volumeSlider.value);
  if (gainNode) {
    gainNode.gain.value = Math.pow(vol, 3);
  }
  volLabel.textContent = Math.round(vol * 100) + '%';
}

volumeSlider.addEventListener('input', updateVolume);
volumeSlider.addEventListener('change', updateVolume);

// 時間表示更新
function updateTimeLabel(current, total) {
  const format = (sec) => {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  };
  document.getElementById('timeLabel').textContent =
    `${format(current)} / ${format(total)}`;
}

// 再生
function playReverse() {
  if (!audioBuffer) return;

  stopAudio();

  const startSec = parseFloat(document.getElementById('seekBar').value);
  const startSample = Math.floor(startSec * audioBuffer.sampleRate);

  const reversed = ctx.createBuffer(
    audioBuffer.numberOfChannels,
    startSample,
    audioBuffer.sampleRate
  );

  for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
    const src = audioBuffer.getChannelData(ch);
    const dst = reversed.getChannelData(ch);

    for (let i = 0; i < startSample; i++) {
      dst[i] = src[startSample - i - 1];
    }
  }

  source = ctx.createBufferSource();
  source.buffer = reversed;
  source.connect(gainNode);
  source.start();

  // 再生時間カウント（疑似）
  let current = startSec;
  updateTimeLabel(current, duration);

  timer = setInterval(() => {
    current -= 0.1;
    if (current <= 0) {
      clearInterval(timer);
      current = 0;
    }
    updateTimeLabel(current, duration);
  }, 100);
}

// 停止
function stopAudio() {
  if (source) {
    try { source.stop(); } catch(e) {}
    source = null;
  }
  if (timer) clearInterval(timer);
}
</script>

</body>
</html>
